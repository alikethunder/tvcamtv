<template name="footer">
  <div class="footer">
    <div class="contacts">
      <div class="email">Email: {{contacts.email}}</div>
      <div class="phone">{{t9n 'phone'}}: {{contacts.phone}}</div>
      <a href="/oferta" class="oferta_link">{{t9n 'oferta.name'}}</a>
    </div>
    <div class="visa_master">
      <img src="/visa_master.png" alt="visa mastercard">
    </div>
  </div>
</template>
