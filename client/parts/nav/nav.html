<template name="nav">
  <nav>
    <div class="nav-wrapper">
      <ul id="nav-mobile" class="left">
        {{#if currentUser}}
        <li><a href="" class="leftsidenav_control"><i class="material-icons">menu</i></a></li>
        {{/if}}
        <a href="/" class="logo left"><img src="/48x48.png" alt="tvcamtv"></a>
      </ul>
      <ul id="nav-mobile" class="right">
        <li class="lang_cont">
          <select class="lang">
            <option value="en">ENG</option>
            <option value="ru">РУС</option>
            <option value="uk">УКР</option>
          </select>
        </li>
        {{#unless currentUser}}
        <li><a href="/sign-in">{{t9n 'signIn'}}</a></li>
        <li><a href="/sign-up">{{t9n 'signUp'}}</a></li>
        {{/unless}}
        {{#if currentUser}}
        <li><a href="" class="logout">{{t9n 'signOut'}}</a></li>
        {{/if}}
      </ul>
    </div>
  </nav>
</template>
