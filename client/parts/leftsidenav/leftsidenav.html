<template name="leftsidenav">
  <div id="leftsidenav" class="leftsidenav_closed">
    <a href="/client" class="client">
      <i class="material-icons">face</i>
      <span class="name">
        {{#if currentUser.profile.name}}
        {{currentUser.profile.name}}
        {{else}}
        {{t9n 'profile'}}
        {{/if}}
      </span>
    </a>
    <ul class="collapsible" data-collapsible="expandable">
      <li>
        <a href="/add_stream" class="collapsible-header collapsible_link"><i class="material-icons">video_call</i>{{t9n 'channel.add'}} {{t9n 'channel.channel'}}</a>
      </li>
      <li>
        <div class="collapsible-header"><i class="material-icons">videocam</i>{{t9n 'channel.channels'}}<i class="material-icons expand">expand_more</i><i
            class="material-icons expand_less">expand_less</i></div>
        <div class="collapsible-body">
          <ul>
            {{#each streams}}
            <li>
              <a href="/stream/{{_id}}" class="collapsible_link">{{#if name}}{{name}}{{else}}{{t9n 'channel.channel'}} {{@index}}{{/if}}</a>
            </li>
            {{else}}
            <span>{{t9n 'channel.no_channels'}}</span>
            {{/each}}
          </ul>
        </div>
      </li>
      <li>
        <a href="/monitor" class="collapsible-header collapsible_link"><i class="material-icons">video_label</i>{{t9n 'channel.monitor'}}</a>
      </li>
      {{#if more_than_one_channel streams}}
      <li>
        <a href="/channels_payment" class="collapsible-header collapsible_link"><i class="material-icons">payment</i>{{t9n 'channels_payment'}}</a>
      </li>
      {{/if}}
    </ul>
  </div>
</template>
