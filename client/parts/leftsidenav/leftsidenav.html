<template name="leftsidenav">
  <div id="leftsidenav" class="leftsidenav_closed">
    <a href="/client" class="client">
      <i class="material-icons">face</i>
      <span class="name">
        {{#if currentUser.profile.name}}
        {{currentUser.profile.name}}
        {{else}}
        Профиль
        {{/if}}
      </span>
    </a>
    <ul class="collapsible" data-collapsible="expandable">
      <li>
        <a href="/add_stream" class="collapsible-header collapsible_link"><i class="material-icons">video_call</i>Добавить
          канал</a>
      </li>
      <li>
        <div class="collapsible-header"><i class="material-icons">videocam</i>Каналы<i class="material-icons expand">expand_more</i><i
            class="material-icons expand_less">expand_less</i></div>
        <div class="collapsible-body">
          <ul>
            {{#each streams}}
            <li>
              <a href="/stream/{{streamId}}" class="collapsible_link">{{#if name}}{{name}}{{else}}канал {{@index}}{{/if}}</a>
            </li>
            {{/each}}
          </ul>
        </div>
      </li>
      <li>
        <a href="/monitor" class="collapsible-header collapsible_link"><i class="material-icons">video_label</i>Мониторинг</a>
      </li>

    </ul>
  </div>
</template>
