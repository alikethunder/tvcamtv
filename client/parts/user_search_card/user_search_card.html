<template name="user_search_card">
  <div class="user_search_card card-panel" data-id="{{_id}}">
    <i class="material-icons">face</i>
    {{profile.name}}

    {{#if a_includes currentUser.contacts.outbound_requests _id}}
    <i class="material-icons cancel_add_to_contacts waves-effect action" data-tooltip="Отменить" data-position="top"
      data-delay="8">cancel</i>
    <i class="material-icons send waves-effect action" data-tooltip="Запрос отправлен" data-position="top" data-delay="8">send</i>
    {{activate_tooltip}}
    {{else}}
    {{#if a_includes currentUser.contacts.inbound_requests _id}}
    <i class="material-icons accept_add_to_contacts waves-effect action" data-tooltip="Принять" data-position="top"
      data-delay="8">check</i>
    <i class="material-icons deny_add_to_contacts waves-effect action" data-tooltip="Отклонить" data-position="top"
      data-delay="8">cancel</i>
    {{activate_tooltip}}
    {{else}}
    <i class="material-icons add_to_contacts waves-effect action" data-tooltip="Добавить в контакты" data-position="top"
      data-delay="8">add</i>
    {{activate_tooltip}}
    {{/if}}
    {{/if}}
  </div>
</template>
