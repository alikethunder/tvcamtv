<template name="add_device">
  <div class="add_device">
    <h5>Добавить устройство</h5>
    <div class="form">
      <div class="input-field col s3">
        <select>
          <option value="" selected>Без видео</option>
          {{#each video}}
          <option value="{{deviceId}}">{{#if label}}{{label}}{{else}}камера {{@index}}{{/if}}</option>
          {{/each}}
        </select>
        <label>Выбрать камеру</label>
      </div>
      <div class="input-field col s3">
          <select>
            <option value="" selected>Без аудио</option>
            {{#each audio}}
            <option value="{{deviceId}}">{{#if label}}{{label}}{{else}}аудиовход {{@index}}{{/if}}</option>
            {{/each}}
          </select>
          <label>Выбрать аудиовход</label>
        </div>
    </div>
  </div>
</template>
