<template name="client">
  <div class="client">
    <!--<div class="image">

    </div>-->
    <div>
        <div class="row">
          <div class="input-field col s3">
            <i class="material-icons prefix">account_circle</i>
            <input id="name" type="text" required value="{{currentUser.profile.name}}">
            <label for="name">{{t9n 'name'}}</label>
          </div>
          <div class="input-field col s3">
              <select id="currency">
                <option value="UAH" selected={{isEqual currentUser.profile.currency 'UAH'}}>UAH</option>
                <option value="RUR" selected={{isEqual currentUser.profile.currency 'RUR'}}>RUR</option>
                <option value="USD" selected={{isEqual currentUser.profile.currency 'USD'}}>USD</option>
                <option value="EUR" selected={{isEqual currentUser.profile.currency 'EUR'}}>EUR</option>
              </select>
              <label>{{t9n 'client.currency'}}</label>
            </div>
        </div>
      </div>
  </div>
</template>
