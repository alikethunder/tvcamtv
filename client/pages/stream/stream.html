<template name="stream">
  <div class="add_device">
    <h5>{{stream.name}}</h5>
    <h4>{{serverDate}}</h4>
    {{#if sameDevice stream.deviceId}}
    <div class="form">
      <div class="input-field col s3">
        <input id="name" type="text" value="{{stream.name}}">
        <label for="name">{{t9n 'channel.channel_name'}}</label>
      </div>
      <div class="input-field col s3">
        <select id="video">
          <option value="" selected="{{isEqual '' stream.constraints.video.deviceId}}">{{#if video}} {{t9n
            'channel.without_video'}} {{else}} {{t9n 'channel.no_available_devices'}} {{/if}}</option>
          {{#each video}}
          <option value="{{deviceId}}" selected="{{isEqual deviceId stream.constraints.video.deviceId}}">{{#if
            label}}{{label}}{{else}} {{t9n 'channel.video_device'}} {{@index}}{{/if}}</option>
          {{/each}}
        </select>
        <label>{{t9n 'channel.select'}} {{t9n 'channel.video_device'}}</label>
      </div>
      <div class="input-field col s3">
        <select id="audio">
          <option value="" selected="{{isEqual '' stream.constraints.audio.deviceId}}">{{#if audio}} {{t9n
            'channel.without_audio'}} {{else}} {{t9n 'channel.no_available_devices'}} {{/if}}</option>
          {{#each audio}}
          <option value="{{deviceId}}" selected="{{isEqual deviceId stream.constraints.audio.deviceId}}">{{#if
            label}}{{label}}{{else}} {{t9n 'channel.audio_device'}} {{@index}}{{/if}}</option>
          {{/each}}
        </select>
        <label>{{t9n 'channel.select'}} {{t9n 'channel.audio_device'}}</label>
      </div>
    </div>
    {{/if}}
    <a class="waves-effect waves-light btn remove_stream red"><i class="material-icons left">remove</i>{{t9n 'delete'}}
      {{t9n 'channel.channel'}}</a>
    <div class="video_container">
      <div class="video_plus_rec_buttons">
        <video id="output" autoplay playsinline controls></video>
        {{#if not_expired_or_first expired first}}
        {{#if record_in_progress}}
        <div class="record_info">{{t9n 'record_info'}}</div>
        {{/if}}
        <div class="rec_buttons">
          {{#if record_in_progress}}
          <span class="record_in_progress red-text">{{t9n 'recording.record_in_progress'}}</span>
          <button class="btn waves-effect waves-light stop_record">{{t9n 'recording.stop'}}</button>
          {{else}}
          <button class="btn waves-effect waves-light start_record">{{t9n 'recording.record'}}</button>
          {{/if}}
          {{#if recording}}
          <button class="btn waves-effect waves-light download_record">{{t9n 'recording.download'}}</button>
          {{/if}}
        </div>
        {{/if}}
      </div>
      <div class="paying">
        <div class="info">
          {{#if first}}
          <span class="green-text">{{t9n 'channel.free'}}</span>
          {{else}}
          <span>{{t9n 'channel.payed till'}} {{payed_till stream.payed_till}}</span>
          {{#if expired}}
          <span class="red-text center">{{t9n 'channel.payment expired'}}</span>
          {{/if}}
          {{/if}}
        </div>
        <div class="buttons">
          {{#unless first}}
          {{#each form in liqpay_forms}}
          {{{form}}}
          {{/each}}
          {{/unless}}
        </div>
        <div class="currency_info">{{{t9n 'currency_info'}}}</div>
      </div>
    </div>
  </div>
</template>
