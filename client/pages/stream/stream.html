<template name="stream">
  <div class="add_device">
    <h5>{{stream.name}}</h5>
    {{#if sameDevice stream.deviceId}}
    <div class="form">
      <div class="input-field col s3">
        <input id="name" type="text" value="{{stream.name}}">
        <label for="name">{{t9n 'channel.channel_name'}}</label>
      </div>
      <div class="input-field col s3">
        <select id="video">
          <option value="" selected="{{isEqual '' stream.constraints.video.deviceId}}">{{#if video}} {{t9n
            'channel.without_video'}} {{else}} {{t9n 'channel.no_available_devices'}} {{/if}}</option>
          {{#each video}}
          <option value="{{deviceId}}" selected="{{isEqual deviceId stream.constraints.video.deviceId}}">{{#if
            label}}{{label}}{{else}} {{t9n 'channel.video_device'}} {{@index}}{{/if}}</option>
          {{/each}}
        </select>
        <label>{{t9n 'channel.select'}} {{t9n 'channel.video_device'}}</label>
      </div>
      <div class="input-field col s3">
        <select id="audio">
          <option value="" selected="{{isEqual '' stream.constraints.audio.deviceId}}">{{#if audio}} {{t9n
            'channel.without_audio'}} {{else}} {{t9n 'channel.no_available_devices'}} {{/if}}</option>
          {{#each audio}}
          <option value="{{deviceId}}" selected="{{isEqual deviceId stream.constraints.audio.deviceId}}">{{#if
            label}}{{label}}{{else}} {{t9n 'channel.audio_device'}} {{@index}}{{/if}}</option>
          {{/each}}
        </select>
        <label>{{t9n 'channel.select'}} {{t9n 'channel.audio_device'}}</label>
      </div>
    </div>
    {{/if}}
    <div class="video_container">

      <div class="video_plus_rec_buttons">
        {{#if source_available stream.deviceId}}
        {{#if channel_loading}}
        <span class="green-text loading_info">{{t9n 'channel.channel_available'}}</span>
        <span class="loading_info">{{t9n 'channel.loading'}}</span>
        <div class="center preloader_back">
          <div class="preloader-wrapper active">
            <div class="spinner-layer spinner-green-only">
              <div class="circle-clipper left">
                <div class="circle"></div>
              </div>
              <div class="gap-patch">
                <div class="circle"></div>
              </div>
              <div class="circle-clipper right">
                <div class="circle"></div>
              </div>
            </div>
          </div>
        </div>
        {{else}}
        <video id="output" autoplay playsinline controls></video>
        {{/if}}
        {{else}}
        <span class="red-text loading_info">{{t9n 'channel.channel_unavailable'}}</span>
        {{/if}}

        {{#if source_available stream.deviceId}}
        {{#unless channel_loading}}
        <div class="rec_buttons">
          {{#if record_in_progress}}
          <span class="record_in_progress red-text">{{t9n 'recording.record_in_progress'}}</span>
          <button class="btn waves-effect waves-light stop_record">
            <i class="material-icons left">stop</i>
            {{t9n 'recording.stop'}}
          </button>
          {{else}}
          <button class="btn waves-effect waves-light start_record">
            <i class="material-icons left red-text">fiber_manual_record</i>
            {{t9n 'recording.record'}}
          </button>
          {{/if}}
          {{#if recording}}
          <button class="btn waves-effect waves-light download_record">
            <i class="material-icons left">file_download</i>
            {{t9n 'recording.download'}}
          </button>
          {{/if}}
        </div>
        {{/unless}}
        {{/if}}
      </div>

      <div class="paying">
        <!--records-->
        <div class="info">
          {{t9n 'recording.recordings'}}
        </div>
      </div>
    </div>
    <a class="waves-effect waves-light btn remove_stream red">
      {{t9n 'delete'}}
      {{t9n 'channel.channel'}}
    </a>
  </div>
</template>
