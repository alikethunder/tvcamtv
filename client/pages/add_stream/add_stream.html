<template name="add_stream">
  <div class="add_device">
    <h5>Добавить канал</h5>
    <div class="form">
      <div class="input-field col s3">
        <input id="name" type="text">
        <label for="name">Название</label>
      </div>
      <div class="input-field col s3">
        <select id="video">
          <option value="" selected>{{#if video}}Без видео{{else}}Нет доступных устройств{{/if}}</option>
          {{#each video}}
          <option value="{{deviceId}}">{{#if label}}{{label}}{{else}}камера {{@index}}{{/if}}</option>
          {{/each}}
        </select>
        <label>Выбрать камеру</label>
      </div>
      <div class="input-field col s3">
        <select id="audio">
          <option value="" selected>{{#if audio}}Без аудио{{else}}Нет доступных устройств{{/if}}</option>
          {{#each audio}}
          <option value="{{deviceId}}">{{#if label}}{{label}}{{else}}аудиовход {{@index}}{{/if}}</option>
          {{/each}}
        </select>
        <label>Выбрать аудиовход</label>
      </div>
    </div>
    <a class="waves-effect waves-light btn add_device_btn"><i class="material-icons left">check</i>Добавить</a>
    <video id="output" autoplay playsinline controls></video>
  </div>
</template>
