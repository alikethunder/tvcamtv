<template name="channels_payment">
  <div class="channels_payment">
    <h5>{{t9n 'channels_payment'}}</h5>
    <div class="buttons">
      {{#each form in liqpay_forms}}
        {{{form}}}
      {{/each}}
    </div>
    <div class="channels">
      <div class="input-field col s12">
        <select multiple id="channels_payment">
          <option value="" disabled selected>{{t9n 'channel.chose channels payment'}}</option>
          {{#each stream in streams}}
          <option value="{{_id}}">{{#if stream.name}}{{stream.name}}{{else}}{{t9n 'channel.channel'}} {{@index}}{{/if}}<span class="right"> {{t9n 'channel.payed till'}} {{payed_till stream.payed_till}}</span></option>
          {{/each}}
        </select>
        <label>{{t9n 'channel.chose channels payment'}}</label>
      </div>
    </div>
  </div>
</template>
