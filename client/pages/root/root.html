<template name="root">
  <div class="section no-pad-bot" id="index-banner">
    <div class="container">
      <h1 class="header center"><img src="/favicon.png" style="width: 40px"> tvcamtv <img src="/favicon.png" style="width: 40px"></h1>
      <div class="row center">
        <h5 class="header col s12 light">{{t9n 'landing.header'}}</h5>
      </div>
      <div class="row center">
        <a href="{{start_link}}" id="download-button" class="btn-large waves-effect waves-light">{{t9n 'landing.start'}}</a>
      </div>
    </div>
  </div>


  <div class="container root">
    <div class="section">

      <!--First row-->
      <div class="row">
        <div class="col s12 m4">
          <div class="icon-block" style="padding: 0 15px;">
            <h2 class="center"><i class="material-icons" style="font-size: inherit">build</i></h2>
            <h5 class="center">Подключайте устройства</h5>

            <p class="light center">Установите камеру (возможно использовать usb камеру) и/или микрофон в любом месте, и подключите к компьютеру.<br> Или установите смартфон и используйте его камеры.</p>
          </div>
        </div>

        <div class="col s12 m4">
          <div class="icon-block" style="padding: 0 15px;">
            <h2 class="center"><i class="material-icons" style="font-size: inherit">video_call</i></h2>
            <h5 class="center">Создайте и настройте</h5>

            <p class="light center">Создайте именованный канал, опционально назначьте ему группу и назначьте подключенное видео
              и/или аудиоустройство.</p>
          </div>
        </div>

        <div class="col s12 m4">
          <div class="icon-block" style="padding: 0 15px;">
            <h2 class="center"><i class="material-icons" style="font-size: inherit">video_label</i></h2>
            <h5 class="center">Просматривайте каналы</h5>

            <p class="light center">Просматривайте созданные каналы из любого места.<br>
              Отдельно каждый, группу каналов или все сразу</p>
          </div>
        </div>
      </div>

      <!--Second row-->
      <div class="row">
        <div class="col s12 m4">
          <div class="icon-block" style="padding: 0 15px;">
            <h2 class="center green-text"><i class="material-icons" style="font-size: inherit">account_balance_wallet</i></h2>
            <h5 class="center">Доступность</h5>

            <p class="light center">Первый канал предоставляется бесплатно и неограниченно по времени.<br> Каждый
              последующий - всего 1$ в месяц за канал.</p>
          </div>
        </div>

        <div class="col s12 m4">
          <div class="icon-block" style="padding: 0 15px;">
            <h2 class="center"><i class="material-icons" style="font-size: inherit">security</i></h2>
            <h5 class="center">Безопасность</h5>

            <p class="light center">Мы не ведем записи ваших каналов, данные передаются напрямую от ваших устройств
              транслирующих каналы к устройствам на которых вы их просматриваете.<br> Только вы можете получить доступ
              к своим каналам только через свой аккаунт.</p>
          </div>
        </div>

        <div class="col s12 m4">
          <div class="icon-block" style="padding: 0 15px;">
            <h2 class="center"><i class="material-icons" style="font-size: inherit">devices</i></h2>
            <h5 class="center">Распределение</h5>

            <p class="light center">Возможность подключить разные устройства в разных местах и просматривать на одной странице в любое время.</p>
          </div>
        </div>
      </div>

      <!--Third row-->
      <div class="row center">
          <div class="icon-block" style="padding: 0 15px;">
            <h2 class="center"><i class="material-icons" style="font-size: inherit">list_alt</i></h2>
            <h5 class="center">Применение</h5>

            <p class="light center">Видео и аудио наблюдение за домом, детской комнатой, помещениями, гаражом, хозяйством, частным участком, стоянкой, частной собственностью, магазином, производством, везде где может это потребоваться.<br> Установите камеру дома, и забудьте о беспокойстве из-за невыключенного утюга или плиты.<i class="material-icons">mood</i></p>
          </div>
      </div>
    </div>
  </div>
</template>
