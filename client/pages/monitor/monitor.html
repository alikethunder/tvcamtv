<template name="monitor">
  <div class="row">
    <div class="col s12">
      <ul class="tabs">
        {{#each group}}
        <li class="tab"><a href="">Test 1</a></li>
        {{/each}}
        <li class="tab col s3"><a class="active" href="#test2">Test 2</a></li>
        <li class="tab col s3 disabled"><a href="#test3">Disabled Tab</a></li>
        <li class="tab col s3"><a href="#test4">Test 4</a></li>
      </ul>
    </div>
    <div id="test1" class="col s12">Test 1</div>
    <div id="test2" class="col s12">Test 2</div>
    <div id="test3" class="col s12">Test 3</div>
    <div id="test4" class="col s12">Test 4</div>
  </div>

  <div class="videos_container">
    {{#each stream in streams}}
    <div class="video_container">
      <div class="video_name">
        <a href="/stream/{{stream._id}}" class="name">{{stream.name}}</a>
        {{#unless @index}}
        <span class="green-text">{{t9n 'channel.free'}}</span>
        {{else}}
        <span class="payed_till">{{t9n 'channel.payed till'}} {{payed_till stream.payed_till}}</span>
        {{/unless}}
      </div>
      {{#unless @index}}
      <video id="{{stream._id}}" autoplay playsinline controls></video>
      {{else}}
      {{#if expired stream.payed_till}}
      <span class="red-text center expired">{{t9n 'channel.payment expired'}}</span>
      <a href="/channels_payment" class="btn waves-effect waves-light green"><i class="material-icons left">payment</i>{{t9n
        'channels_payment'}}</a>
      {{else}}
      <video id="{{stream._id}}" autoplay playsinline controls></video>
      {{/if}}
      {{/unless}}
    </div>
    {{/each}}
  </div>
</template>
